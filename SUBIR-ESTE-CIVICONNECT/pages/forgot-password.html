<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — CiviConnect</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <div class="auth-layout">
    <div class="auth-panel">
      <a href="../index.html" class="auth-logo"><span class="logo-icon">◎</span> CiviConnect</a>
      <div class="auth-panel-content">
        <div class="auth-quote"><p>"Recupera el acceso y sigue construyendo comunidad."</p></div>
        <div class="auth-features">
          <div class="auth-feature"><span>🔐</span><span>Proceso seguro y rápido</span></div>
          <div class="auth-feature"><span>📧</span><span>Enlace enviado a tu correo</span></div>
          <div class="auth-feature"><span>⏱️</span><span>El enlace expira en 1 hora</span></div>
        </div>
      </div>
    </div>
    <div class="auth-form-section">
      <div class="auth-form-container">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="font-size:3rem;margin-bottom:0.75rem;">🔑</div>
          <h1 style="font-size:1.6rem;margin-bottom:0.4rem;">¿Olvidaste tu contraseña?</h1>
          <p style="color:var(--text-secondary);">Ingresa tu correo y te enviaremos un enlace para restablecerla</p>
        </div>

        <div class="form-error auth-error" id="authError" style="display:none;padding:0.75rem 1rem;margin-bottom:1rem;"></div>
        <div id="authSuccess"></div>

        <form id="resetForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="nombre@correo.com" autocomplete="email" required />
          </div>
          <button type="submit" class="btn-primary btn-block">Enviar enlace de recuperación</button>
        </form>

        <p class="auth-footer-text" style="margin-top:1.25rem;">
          <a href="login.html" class="form-link">← Volver al inicio de sesión</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // Mostrar error visible
    document.getElementById('resetForm')?.addEventListener('submit', function() {
      const errEl = document.getElementById('authError');
      if (errEl) errEl.style.display = 'block';
    });
  </script>
</body>
</html>
